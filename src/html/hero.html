<section class="hero hero--with-header">
  <div class="hero__bg"></div>

  <aside class="hero__side-nav" aria-label="Hero navigation">
    <a class="hero__progress" href="/" aria-label="Go to the home page">
      <span class="hero__progress-line"><span></span></span>
      <span class="hero__progress-number">01</span>
    </a>

    <nav class="hero__socials" aria-label="Social links">
      <a href="/" aria-label="Twitter home page">Tw</a>
      <a href="/" aria-label="LinkedIn home page">In</a>
      <a href="/" aria-label="Facebook home page">Fb</a>
    </nav>
  </aside>

  <div class="container hero__inner">
    <div class="hero__content">
      <span class="hero__eyebrow">01</span>
      <h1 class="hero__title">Explore <span>Indonesia</span></h1>

      <div class="hero__actions">
        <a class="hero__cta" href="#">Start travelling</a>
      </div>
    </div>
  </div>

  <div class="hero__bottom">
    <div class="hero__features" aria-hidden="false">
      <article class="hero__feature">
        <span class="hero__feature-number">01</span>
        <h3 class="hero__feature-title">Title here</h3>
        <p class="hero__feature-text">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
      </article>
      <article class="hero__feature">
        <span class="hero__feature-number">02</span>
        <h3 class="hero__feature-title">Title here</h3>
        <p class="hero__feature-text">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
      </article>

      <article class="hero__feature">
        <span class="hero__feature-number">03</span>
        <h3 class="hero__feature-title">Title here</h3>
        <p class="hero__feature-text">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
      </article>
    </div>
    
    <div class="hero__media">
      <figure class="hero__media-figure">
        <picture class="hero__picture">
          <source media="(min-width: 1024px)" srcset="./img/hero-picture-1x-desktop.jpg 1x, ./img/hero-picture-2x-desktop.jpg 2x">
          <img class="hero__image" src="./img/hero-picture-1x-mobile.jpg" srcset="./img/hero-picture-2x-mobile.jpg 2x" alt="Tropical coastline" />
        </picture>

        <button class="hero__play" aria-label="Play video">
          <img src="./img/play.svg" class="hero__play-icon" alt="Play" />
        </button>
      </figure>
    </div>
  </div>
</section>
