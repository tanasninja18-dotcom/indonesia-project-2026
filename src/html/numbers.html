<section class="numbers">
    <div class="container">
        <div class="secrets">
            <h2 class="secrets__title">Explore Our Secrets</h2>
            <div class="secrets__slider">
                <button class="secrets__arrow secrets__prev">❮</button>
                <div class="secrets__slider-wrapper">
                    <div class="secrets__track">
                        <img src="img/bali1.jpg" class="secrets__item">
                        <img src="img/bali2.jpg" class="secrets__item">
                        <img src="img/bali3.jpg" class="secrets__item">
                    </div>
                </div>
                <button class="secrets__arrow secrets__next">❯</button>
            </div>
        </div>

        <div class="section-header">
            <h2 class="section-header__title">By The Numbers</h2>
            <p class="section-header__text">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Fusce commodo magna et libero.</p>
        </div>

        <div class="numbers__grid">
            <div class="numbers-card">
                <h3 class="numbers-card__value">100+</h3>
                <p class="numbers-card__label">Label description</p>
            </div>
            <div class="numbers-card">
                <h3 class="numbers-card__value">43,000+</h3>
                <p class="numbers-card__label">Label description</p>
            </div>
            <div class="numbers-card">
                <h3 class="numbers-card__value">30+</h3>
                <p class="numbers-card__label">Label description</p>
            </div>
        </div>
    </div>
    
<script>
document.addEventListener('DOMContentLoaded', () => {
  const track = document.querySelector('.secrets__track');
  const next = document.querySelector('.secrets__next');
  const prev = document.querySelector('.secrets__prev');
  let index = 0;

  next.addEventListener('click', () => {
    if (index < 2) {
      index++;
      track.style.transform = `translateX(-${index * 400}px)`;
    }
  });
  prev.addEventListener('click', () => {
    if (index > 0) {
      index--;
      track.style.transform = `translateX(-${index * 400}px)`;
    }
  });
});
</script>
</section>
