<header class="header" role="banner">
  <div class="container header__inner">
    <a class="header__brand" href="/">
      <img class="header__logo" src="./img/logo.svg" alt="Explore Indonesia" />
      <span class="header__brand-text">Explore <span>Indonesia</span></span>
    </a>

    <nav id="primary-nav" class="header__nav" role="navigation" aria-label="Main navigation">
      <ul class="header__list">
        <li class="header__item"><a class="header__link" href="#">Destinations</a></li>
        <li class="header__item"><a class="header__link" href="#">Experiences</a></li>
        <li class="header__item"><a class="header__link" href="#">About</a></li>
        <li class="header__item"><a class="header__link" href="#">Gallery</a></li>
      </ul>
    </nav>

    <div class="header__controls">
      <button class="header__search" type="button" aria-label="Search">
        <img src="./img/search.svg" alt="" aria-hidden="true" />
      </button>

      <button class="header__toggle" type="button" aria-label="Toggle menu" aria-expanded="false" aria-controls="primary-nav">
        <span class="header__burger">
          <span class="burger__line"></span>
          <span class="burger__line"></span>
          <span class="burger__line"></span>
        </span>
      </button>
    </div>
  </div>
</header>
